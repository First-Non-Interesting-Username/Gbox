name: Cleanup Old GHCR Images

on:
  schedule:
    - cron: '0 18 * * 0'
  workflow_dispatch:

jobs:
  delete-old-images:
    name: Delete images older than 45 days
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - gbox-plasma-amd
          - gbox-plasma-nvidia
          - gbox-plasma-intel
          - gbox-gnome-amd
          - gbox-gnome-nvidia
          - gbox-gnome-intel

    steps:
      - name: Delete older container versions
        uses: snok/container-retention-policy@v3
        with:
          account-type: personal
          token: ${{ secrets.PAT_PACKAGES }}
          package-name: ${{ matrix.image }}
          cut-off: 45d
          keep-at-least: 7
          skip-tags: latest
          untagged-only: false