name: Build Gbox

on: 
    schedule:
    - cron: '0 16 * * *'
    workflow_dispatch:

jobs: 
    build-push:
        name: Build images and push to ghcr.io
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
            id-token: write
        strategy:
            fail-fast: false
            matrix:
                de: [plasma, gnome]
                gpu: [amd, nvidia, intel]
        
        steps:
            - name: Free disk space
              uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
              with:
                tool-cache: true
                android: true
                dotnet: true
                haskell: true
                large-packages: true
                docker-images: true
                swap-storage: true

            - name: checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
            
            - name: Matrix Variables
              run: |
                echo "IMAGE_NAME=gbox-${{ matrix.de }}-${{ matrix.gpu }}" >> $GITHUB_ENV
            
            - name: Generate tags
              id: tags
              shell: bash
              run: |
                TIMESTAMP="$(date +%Y%m%d)"
                TAGS=("${TIMESTAMP}")
                TAGS+=("latest")
                OUTPUT_TAGS="${TAGS[*]}"
                echo "tags=${OUTPUT_TAGS}" >> $GITHUB_OUTPUT

            - name: Image Metadata
              uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
              id: meta
              with:
                images: |
                    ${{ env.IMAGE_NAME }}
                labels: |
                    org.opencontainers.image.title=Gbox - Gaming distroBOX
                    org.opencontainers.image.description=Personal image for gaming in distrobox
                    org.opencontainers.image.vendor=${{ github.repository_owner }}
                    org.opencontainers.image.authors=${{ github.repository_owner }}
                    org.opencontainers.image.base.name=ghcr.io/ublue-os/arch-toolbox


            - name: Compute SOURCE_DATE_EPOCH
              id: epoch
              run: echo "epoch=$(date -d '${{ github.event.head_commit.timestamp }}' +%s)" >> $GITHUB_OUTPUT

            - name: Build Image
              id: build_image
              uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2
              with:
                containerfiles: |
                    ./Containerfile.gbox
                image: ${{ env.IMAGE_NAME }}
                tags: |
                    ${{ steps.tags.outputs.tags }}
                labels: ${{ steps.meta.outputs.labels }}
                oci: false
                extra-args: |
                    --target=gbox-${{ matrix.de }} --security-opt=seccomp=unconfined --security-opt=label=disable
                    --skip-unused-stages=false
                build-args: |
                    SOURCE_DATE_EPOCH=${{ steps.epoch.outputs.epoch }}
                    GPU_VENDOR=${{ matrix.gpu }}
                    IMAGE_NAME=${{ env.IMAGE_NAME }}

            - name: Login to ghcr.io
              uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 # v1
              with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

            - name: Lowercase registry owner
              run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

            - name: Push to ghcr.io
              id: push
              uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2
              with:
                image: ${{ steps.build_image.outputs.image }}
                tags: ${{ steps.build_image.outputs.tags }}
                registry: ghcr.io/${{ env.OWNER }}
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

            - name: Install Cosign
              uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
            
            - name: Sign image with Cosign
              run: |
                cosign sign --yes \
                ghcr.io/${{ env.OWNER }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
